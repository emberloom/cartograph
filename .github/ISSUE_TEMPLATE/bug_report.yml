name: Bug Report
description: Something is not working as expected
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Run `cartograph --repo /path/to/repo index`
        2. Run `cartograph --repo /path/to/repo blast-radius src/main.rs`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include any error messages or panic output.
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: "rustc 1.84.0 (9fc8..."
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.3 / Ubuntu 24.04 / ..."
    validations:
      required: true

  - type: input
    id: repo_language
    attributes:
      label: Indexed Repository Language
      description: What language is the repo you ran `index` on?
      placeholder: "Rust / TypeScript / mixed / ..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs (set RUST_LOG=debug), config excerpts, or anything else relevant.
    validations:
      required: false